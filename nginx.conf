events { 
    worker_connections 1024; 
}

http {
    # This defines the group of 'clones' Nginx will talk to
    upstream flask_app {
        # 'web' matches the service name in your docker-compose.yml
        server web:5000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}