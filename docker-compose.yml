services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: dbname

  web:
    build: .
    deploy:
      replicas: 3  # This creates 3 copies of your app
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/dbname
    depends_on:
      - db

   db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data # This saves your data to your hard drive!
...
volumes:
  postgres_data:   

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web